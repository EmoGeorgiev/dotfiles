"$schema" = 'https://starship.rs/config-schema.json'

format = """
[╭─](#94e2d5)$username\
$hostname\
$directory\
$fill\
$git_branch\
$git_status\
\n$character"""

[username]
show_always = true
format = "[ $user@](bold #8aadf4)"

[hostname]
ssh_only = false
format = "[$hostname](bold #8aadf4)"

[directory]
style = "bold #8aadf4"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "…/"

[fill]
symbol = "."
style = "bold #94e2d5"

[git_branch]
symbol = ""
style = "bold #8aadf4"
format = '[ $symbol $branch ]($style)'

[git_status]
style = "bold #8aadf4"
format = '[($all_status$ahead_behind )]($style)'

[character]
success_symbol = "[╰─>](bold fg:#94e2d5)"
error_symbol = "[╰─>](bold fg:#94e2d5)"
